services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: comptacopilot
      POSTGRES_PASSWORD: comptacopilot
      POSTGRES_DB: comptacopilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
